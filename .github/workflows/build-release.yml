name: Build APK Release

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout clean source
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Read app version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | sed -E 's/.*versionName "([^"]+)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Clean old outputs
        run: |
          rm -rf app/build
          rm -f SignalScout-*.apk

      - name: Build APK
        run: ./gradlew --no-build-cache clean :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "SignalScout-v${VERSION}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Signal Scout v${{ env.VERSION }}
          files: SignalScout-v${{ env.VERSION }}.apk
          overwrite_files: true
