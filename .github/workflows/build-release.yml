name: Build APK Release

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: gradle assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk SignalScout-v0.1.4.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.4
          name: Signal Scout v0.1.4
          files: SignalScout-v0.1.4.apk
          overwrite_files: true
