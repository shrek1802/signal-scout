name: Build APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Unzip project
        run: unzip signal_scout_v0_1_github_build.zip -d app

      - name: Build APK
        run: |
          cd app
          flutter pub get
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Signal-Scout-v0.1.apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
