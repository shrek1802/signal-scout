name: Build Latest APK Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pick latest project ZIP
        run: |
          ZIP=$(ls -1 signal_scout_android_v*_full_project.zip | sort -V | tail -n 1)
          echo "ZIP=$ZIP" >> $GITHUB_ENV

          VERSION=$(basename "$ZIP" | sed 's/signal_scout_android_v//' | sed 's/_full_project.zip//' | tr '_' '.')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "Using ZIP=$ZIP"
          echo "Detected VERSION=$VERSION"

      - name: Unzip project
        run: unzip "$ZIP" -d appsrc

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          cd appsrc
          gradle assembleDebug

      - name: Rename APK
        run: cp appsrc/app/build/outputs/apk/debug/app-debug.apk "SignalScout-v${VERSION}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Signal Scout v${{ env.VERSION }}
          files: SignalScout-v${{ env.VERSION }}.apk
          overwrite_files: true
